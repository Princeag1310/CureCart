name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: curecart_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/curecart_test?sslmode=disable
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/curecart_test?sslmode=disable
      GEMINI_API_KEY: dummy_gemini_key
      IMAGEKIT_URL_ENDPOINT: https://ik.imagekit.io/dummy_id
      IMAGEKIT_PUBLIC_KEY: dummy_public_key
      IMAGEKIT_PRIVATE_KEY: dummy_private_key
      GOOGLE_CLIENT_ID: dummy_google_client_id
      GOOGLE_CLIENT_SECRET: dummy_google_client_secret
      NEXTAUTH_SECRET: dummy_ci_secret_string_not_for_production
      NEXTAUTH_URL: http://localhost:3000
      RAZORPAY_KEY_ID: rzp_test_dummy_key_id
      RAZORPAY_KEY_SECRET: dummy_key_secret
      NEXT_PUBLIC_RAZORPAY_KEY_ID: rzp_test_dummy_key_id
      ARCJET_KEY: ajkey_dummy_arcjet_key
      MAILER_PRO_API_URL: http://localhost:5000/api/contacts
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: "587"
      SMTP_USER: dummy@example.com
      SMTP_PASS: dummy_app_password
      SMTP_FROM: "CureCart <no-reply@curecart.com>"
      TAVILY_API_KEY: dummy_tavily_key

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Push database schema
        run: npx prisma db push

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type-check
        run: npm run type-check

     
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7